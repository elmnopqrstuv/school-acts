<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADI — Authentication System Entry Gateway</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; width: 100vw; background: var(--bg-primary);">

    <div class="modal-content" style="max-width: 400px; border-radius: 6px; box-shadow: 0 15px 35px rgba(0,0,0,0.7);">
        <header style="text-align: center; margin-bottom: 2rem;">
            <h2 style="font-family: 'Cinzel', serif; font-size: 2.2rem; color: var(--text-light); letter-spacing: 3px;">ADI</h2>
            <p style="color: var(--accent-gold); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px; font-weight:600; margin-top:0.25rem;">Automotive Infrastructure Gateway</p>
        </header>

        <div id="login-error-toast" class="hidden" style="background: rgba(239,68,68,0.1); border: 1px solid #ef4444; color: #ef4444; padding: 0.75rem; border-radius: 4px; font-size: 0.8rem; text-align: center; margin-bottom: 1.5rem;">
            Invalid structural credentials specified.
        </div>

        <form id="system-login-form">
            <div class="form-group">
                <label>Operational Operator Identity Key username</label>
                <input type="text" id="login-username" required placeholder="e.g. evan_admin" autocomplete="username">
            </div>
            <div class="form-group" style="margin-bottom: 2rem;">
                <label>Crypt Security Matrix Password Access Phrase</label>
                <input type="password" id="login-password" required placeholder="••••••••" autocomplete="current-password">
            </div>
            <button type="submit" class="form-submit-btn" style="width: 100%; padding: 0.85rem; text-transform: uppercase; letter-spacing: 1px; font-size: 0.9rem;">Authenticate Framework Session</button>
        </form>
    </div>

    <script>
        document.getElementById("system-login-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const usernameVal = document.getElementById("login-username").value;
            const passwordVal = document.getElementById("login-password").value;
            const toast = document.getElementById("login-error-toast");

            try {
                const response = await fetch('../api/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameVal, password: passwordVal })
                });
                const resData = await response.json();

                if (response.ok && resData.success) {
                    window.location.href = 'index.html';
                } else {
                    toast.textContent = resData.error || "Authentication failure.";
                    toast.classList.remove("hidden");
                }
            } catch (err) {
                console.error("Authentication trace break:", err);
            }
        });
    </script>
</body>
</html>
