<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADI — Dashboard System Settings</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="brand">
                <h2 class="brand-title">ADI</h2>
                <p class="brand-subtitle">Automotive Infrastructure</p>
            </div>
            <nav class="nav-links">
                <a href="index.html">Dashboard</a>
                <a href="index.html#gallery-section">Showroom Fleet</a>
                <a href="orders.html">Orders Ledger</a>
                <a href="settings.html" class="active">System Settings</a>
            </nav>
        </aside>

        <div class="main-panel">
            <header class="dashboard-header">
                <h1>Global Infrastructure Settings</h1>
            </header>

            <main class="content-body" style="max-width: 650px;">
                <h2>Database System Vectors</h2>
                
                <div style="background: var(--bg-secondary); border: 1px solid var(--border-color); padding: 2.5rem; border-radius: 6px; display: flex; flex-direction: column; gap: 1.5rem;">
                    <div class="form-group">
                        <label>PDO Relational System Cluster Path Identifier</label>
                        <input type="text" value="mysql:host=localhost;dbname=warehouse_db;charset=utf8mb4" readonly style="background: var(--bg-primary); border-style: solid; color: var(--text-muted); cursor: not-allowed; font-family: monospace;">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Default Ledger Row Allocation</label>
                            <select style="background: var(--bg-primary);">
                                <option>10 Entries</option>
                                <option selected>25 Entries</option>
                                <option>50 Entries</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Showroom Fleet Refresh Sequence</label>
                            <select style="background: var(--bg-primary);">
                                <option selected>Real-time (Sockets)</option>
                                <option>Every 5 Minutes</option>
                                <option>Manual Fetch Interlock</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group" style="margin-top: 1rem;">
                        <label style="display: flex; align-items: center; gap: 0.5rem; text-transform: none; color: var(--text-light); font-size: 0.85rem; cursor: pointer;">
                            <input type="checkbox" checked style="width: auto; margin: 0;"> Enable safe parameters mapping against malicious injections (SQL Prepared Statements)
                        </label>
                    </div>

                    <div style="display: flex; justify-content: flex-end; margin-top: 1rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
                        <button class="form-submit-btn" onclick="alert('Configuration maps saved successfully.');" style="padding: 0.75rem 2rem;">Save System Flags</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

</body>
</html>
